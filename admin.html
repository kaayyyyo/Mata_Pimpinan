<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Admin - PORTAL MATA PIMPINAN</title>
  
  <!-- Fonts & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  
  <style>
    .admin-nav {
      display: flex;
      gap: 0.5rem;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 1.5rem;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .admin-nav-item {
      padding: 0.75rem 1.25rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .admin-nav-item:hover {
      color: var(--primary);
    }
    .admin-nav-item.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    
    <!-- Admin Sidebar -->
    <aside class="dashboard-sidebar">
      <div class="sidebar-header">
        <img src="assets/Logo.jpg" alt="DPMPTSP Emblem" class="sidebar-logo">
        <div class="sidebar-title-block">
          <span class="title">ADMIN PORTAL</span>
          <span class="sub">DPMPTSP Kota Samarinda</span>
        </div>
      </div>

      <nav class="sidebar-menu">
        <div class="menu-label">Navigasi Utama</div>
        <a href="index.html" class="menu-item"><div class="menu-item-left"><i class="fas fa-home"></i> <span>Portal Utama</span></div></a>
        <a href="dashboard.html" class="menu-item"><div class="menu-item-left"><i class="fas fa-chart-line"></i> <span>Lihat Dashboard</span></div></a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-outline btn-back" onclick="Store.logout()" style="color: var(--danger); border-color: var(--danger-bg); width: 100%;">
          <i class="fas fa-sign-out-alt"></i> Keluar Sesi
        </button>
      </div>
    </aside>

    <!-- Admin Main Content Area -->
    <div class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="topbar-wrapper">
          <div class="topbar-left">
            <div class="page-breadcrumbs">
              <h2 class="breadcrumb-title">Panel Manajemen Data Eksekutif</h2>
              <p class="breadcrumb-sub">Kelola record data langsung ke database Google Sheets</p>
            </div>
          </div>

          <div class="topbar-right">
            <div class="flex items-center gap-2" style="background: var(--bg-main); padding: 0.4rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
              <i class="fas fa-user-shield" style="color: var(--primary);"></i>
              <span class="font-semibold" id="adminName" style="font-size: 0.85rem; color: var(--text-main);">Admin Pimpinan</span>
            </div>
          </div>
        </div>
      </header>

      <main class="dashboard-content">
        <!-- Navigation Tabs -->
        <div class="admin-nav">
          <div class="admin-nav-item active" data-tab="pegawai"><i class="fas fa-users-viewfinder"></i> Data Pegawai</div>
          <div class="admin-nav-item" data-tab="pbg"><i class="fas fa-building-columns"></i> Retribusi PBG</div>
          <div class="admin-nav-item" data-tab="dispensasi"><i class="fas fa-user-clock"></i> Dispensasi</div>
          <div class="admin-nav-item" data-tab="rapat"><i class="fas fa-file-signature"></i> Notulen Rapat</div>
          <div class="admin-nav-item" data-tab="skm"><i class="fas fa-star-half-alt"></i> Survei SKM</div>
          <div class="admin-nav-item" data-tab="investasi"><i class="fas fa-chart-pie"></i> Realisasi Investasi</div>
        </div>

        <!-- Dynamic Admin Content Container -->
        <div id="adminContent">
          <!-- Injected dynamically by admin.js -->
        </div>
      </main>
    </div>

  </div>

  <!-- Reusable CRUD Modal Overlay -->
  <div class="modal-overlay" id="crudModalOverlay">
    <div class="modal-box" style="max-width: 550px;">
      <div class="modal-header">
        <h3 class="modal-title" id="crudModalTitle">Kelola Data</h3>
        <button class="modal-close" id="crudModalClose"><i class="fas fa-times"></i></button>
      </div>
      <form id="crudForm">
        <div class="modal-body">
          <div id="crudFormFields">
            <!-- Fields generated dynamically by admin.js -->
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline btn-sm" id="crudCancelBtn">Batal</button>
          <button type="submit" class="btn btn-primary btn-sm" id="crudSaveBtn">Simpan Perubahan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
